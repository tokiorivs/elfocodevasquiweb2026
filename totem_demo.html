<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASQUI | Totem Experience Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0F172A;
            color: white;
            margin: 0;
            overflow: hidden; /* Prevent scrolling for the full-screen experience */
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #22c55e 0%, #0F172A 70%);
            z-index: -1;
            opacity: 0.8;
        }

        /* Totem Container */
        .totem-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        .totem-frame {
            position: relative;
            width: 320px; /* Base width for mobile-like vertical screen */
            aspect-ratio: 9 / 16;
            background: #000;
            border: 8px solid #1e293b;
            border-radius: 40px;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5), 0 30px 60px -30px rgba(0,0,0,0.5);
            overflow: hidden;
            transform: rotateY(-5deg) rotateX(2deg);
            transition: transform 0.5s ease;
        }

        .totem-frame:hover {
            transform: rotateY(0deg) rotateX(0deg);
        }

        /* YouTube Player Area - Zoom trick to fill vertical space */
        #player-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 317%; /* 16/9 ratio relative to 9/16 container (256/81 * 100) */
            height: 100%;
            transform: translateX(-50%);
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <div class="totem-wrapper">
        <div class="totem-frame" id="totem">
            <!-- YouTube Iframe -->
            <div id="player-container">
                <div id="player"></div>
            </div>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        const videoId = 'hV7bWxAgd7k';
        
        // Initialize Player
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'controls': 1, // Show default controls
                    'rel': 0,
                    'showinfo': 0,
                    'modestbranding': 1,
                    'loop': 1,
                    'playlist': videoId,
                    'mute': 0 
                }
            });
        }
    </script>
</body>
</html>
